<div class="page-head">
  <h1>Visitantes</h1>
  <button mat-flat-button color="primary" (click)="nuevo()">
    <mat-icon>add</mat-icon> Nuevo
  </button>
</div>

@if (loading) {
  <div class="loading"><mat-spinner /></div>
} @else {
  <div class="table-wrap mat-elevation-z2">
    <table mat-table [dataSource]="dataSource">
      <ng-container matColumnDef="nombre_visitante">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let r">{{ r.nombre_visitante }}</td>
      </ng-container>
      <ng-container matColumnDef="edad">
        <th mat-header-cell *matHeaderCellDef>Edad</th>
        <td mat-cell *matCellDef="let r">{{ r.edad }}</td>
      </ng-container>
      <ng-container matColumnDef="estatura">
        <th mat-header-cell *matHeaderCellDef>Estatura (m)</th>
        <td mat-cell *matCellDef="let r">{{ r.estatura }}</td>
      </ng-container>
      <ng-container matColumnDef="id_titular">
        <th mat-header-cell *matHeaderCellDef>Titular</th>
        <td mat-cell *matCellDef="let r">{{ r.id_titular }}</td>
      </ng-container>
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let r" class="actions">
          <button mat-icon-button (click)="editar(r)"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button (click)="eliminar(r)"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
    <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons />
  </div>
}
