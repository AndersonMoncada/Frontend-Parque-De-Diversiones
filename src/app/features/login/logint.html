<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Parque de Diversiones</mat-card-title>
      <mat-card-subtitle>Iniciar Sesión</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Usuario</mat-label>
          <input matInput formControlName="nombre_usuario" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput type="password" formControlName="contrasena" />
        </mat-form-field>

        <button mat-flat-button color="primary" type="submit" class="full-width">
          Ingresar
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
