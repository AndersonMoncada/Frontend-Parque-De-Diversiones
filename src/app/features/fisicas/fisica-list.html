<div class="page-head">
  <h1>Atracciones Físicas</h1>
  <button mat-flat-button color="primary" (click)="nuevo()">
    <mat-icon>add</mat-icon> Nueva
  </button>
</div>

@if (loading) {
  <div class="loading"><mat-spinner /></div>
} @else {
  <div class="table-wrap mat-elevation-z2">
    <table mat-table [dataSource]="dataSource">
      <ng-container matColumnDef="id_atraccion">
        <th mat-header-cell *matHeaderCellDef>ID Atracción</th>
        <td mat-cell *matCellDef="let r">{{ r.id_atraccion }}</td>
      </ng-container>
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let r" class="actions">
          <button mat-icon-button (click)="eliminar(r)"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
    <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons />
  </div>
}
