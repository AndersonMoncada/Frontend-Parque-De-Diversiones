<h2 mat-dialog-title>{{ data.mode === 'create' ? 'Nuevo Usuario' : 'Editar Usuario' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field appearance="outline"><mat-label>Nombre de Usuario</mat-label><input matInput formControlName="nombre_usuario"></mat-form-field>
    <mat-form-field appearance="outline"><mat-label>Contraseña</mat-label><input matInput type="password" formControlName="contrasena"></mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Rol</mat-label>
      <mat-select formControlName="rol">
        <mat-option value="admin">Admin</mat-option>
        <mat-option value="usuario">Usuario</mat-option>
      </mat-select>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancelar</button>
  <button mat-flat-button color="primary" (click)="save()">Guardar</button>
</mat-dialog-actions>
