<div class="page-head">
  <h1>Titulares</h1>
  <button mat-flat-button color="primary" (click)="nuevo()">
    <mat-icon>add</mat-icon> Nuevo
  </button>
</div>

@if (loading) {
  <div class="loading"><mat-spinner /></div>
} @else {
  <div class="table-wrap">
    <table mat-table [dataSource]="dataSource">
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let r">{{ r.nombre }}</td>
      </ng-container>
      <ng-container matColumnDef="cedula">
        <th mat-header-cell *matHeaderCellDef>Cédula</th>
        <td mat-cell *matCellDef="let r">{{ r.cedula }}</td>
      </ng-container>
      <ng-container matColumnDef="telefono">
        <th mat-header-cell *matHeaderCellDef>Teléfono</th>
        <td mat-cell *matCellDef="let r">{{ r.telefono || '—' }}</td>
      </ng-container>
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let r" class="actions">
          <button mat-icon-button (click)="editar(r)"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button (click)="eliminar(r)"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
    <mat-paginator [pageSizeOptions]="[5,10,25]" />
  </div>
}
