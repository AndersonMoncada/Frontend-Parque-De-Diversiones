<h2 mat-dialog-title>{{ data.mode === 'create' ? 'Nuevo Titular' : 'Editar Titular' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field appearance="outline"><mat-label>Nombre</mat-label><input matInput formControlName="nombre"></mat-form-field>
    <mat-form-field appearance="outline"><mat-label>Cédula</mat-label><input matInput formControlName="cedula"></mat-form-field>
    <mat-form-field appearance="outline"><mat-label>Teléfono</mat-label><input matInput formControlName="telefono"></mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancelar</button>
  <button mat-flat-button color="primary" (click)="save()">Guardar</button>
</mat-dialog-actions>
