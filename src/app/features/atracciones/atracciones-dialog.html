<h2 mat-dialog-title>{{ data.mode === 'create' ? 'Nueva Atraccion' : 'Editar Atraccion' }}</h2>
<mat-dialog-content class="dialog-body">
  <form [formGroup]="form" class="grid">

    <mat-form-field appearance="outline" class="span-2">
      <mat-label>Nombre</mat-label>
      <input matInput formControlName="nombre" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="span-2">
      <mat-label>Edad minima</mat-label>
      <input matInput type="number" formControlName="edad_minima" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="span-2">
      <mat-label>Estatura minima</mat-label>
      <input matInput type="number" formControlName="estatura_minima" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="span-2">
      <mat-label>ID Sede</mat-label>
      <input matInput formControlName="id_sede" />
    </mat-form-field>
    
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">Cancelar</button>
  <button mat-flat-button color="primary" type="button" (click)="save()">Guardar</button>
</mat-dialog-actions>
