<div class="page-head">
  <h1>Atracciones</h1>
  <button mat-flat-button color="primary" type="button" (click)="nuevo()">
    <mat-icon>add</mat-icon>
    Nueva
  </button>
</div>

@if (loading) {
  <div class="loading">
    <mat-spinner />
  </div>
} @else {
  <div class="table-wrap mat-elevation-z2">
    <table mat-table [dataSource]="dataSource">
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>nombre</th>
        <td mat-cell *matCellDef="let r">{{ r.nombre }}</td>
      </ng-container>
      <ng-container matColumnDef="edad_minima">
        <th mat-header-cell *matHeaderCellDef>edad_minima</th>
        <td mat-cell *matCellDef="let r">{{ r.edad_minima }}</td>
      </ng-container>
      <ng-container matColumnDef="estatura_minima">
        <th mat-header-cell *matHeaderCellDef>estatura_minima</th>
        <td mat-cell *matCellDef="let r">{{ r.estatura_minima }}</td>
      </ng-container>
      <ng-container matColumnDef="id_sede">
        <th mat-header-cell *matHeaderCellDef>id_sede</th>
        <td mat-cell *matCellDef="let r">{{ r.id_sede }}</td>
      </ng-container>
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let r" class="actions">
          <button mat-icon-button type="button" (click)="editar(r)" aria-label="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button type="button" (click)="eliminar(r)" aria-label="Eliminar">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
    <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons />
  </div>
}
